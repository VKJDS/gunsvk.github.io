<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vinicius</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

/* Tela inicial */
#enter {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    z-index: 10;
    transition: opacity 1s ease;
}

/* Container */
.container {
    position: relative;
    top: 18%;
}

img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 3px solid #b026ff;
    box-shadow: 0 0 25px #b026ff;
}

h1 {
    font-size: 55px;
    margin: 15px 0;
    color: #b026ff;
    text-shadow: 0 0 20px #b026ff;
    letter-spacing: 3px;
}

.links a {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    background: rgba(176,38,255,0.15);
    border: 1px solid #b026ff;
    border-radius: 12px;
    color: #b026ff;
    text-decoration: none;
    transition: 0.3s;
}

.links a:hover {
    background: #b026ff;
    color: black;
    box-shadow: 0 0 15px #b026ff;
}

button {
    margin-top: 20px;
    padding: 8px 20px;
    background: transparent;
    border: 1px solid #b026ff;
    color: #b026ff;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #b026ff;
    color: black;
}
</style>
</head>

<body>

<div id="enter">Clique para entrar</div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <img src="foto.gif">
    <h1>vinicius</h1>

    <div class="links">
        <a href="#">Instagram</a>
        <a href="#">Discord</a>
        <a href="#">YouTube</a>
    </div>

    <button onclick="toggleMusic()">🔊 Mute</button>
</div>

<script>
const enterScreen = document.getElementById("enter");
const music = document.getElementById("music");

enterScreen.addEventListener("click", function(){
    music.play();
    enterScreen.style.opacity = "0";
    setTimeout(() => { enterScreen.style.display = "none"; }, 1000);
});

function toggleMusic(){
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
}
</script>

</body>
</html>
